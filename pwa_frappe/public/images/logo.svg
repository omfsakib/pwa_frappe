<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>PWA Frappe</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="300" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6D6FFF" />
      <stop offset="1" stop-color="#4338CA" />
    </linearGradient>
  </defs>

  <!-- App icon background -->
  <rect width="300" height="300" rx="64" fill="url(#bg)" />

  <!-- App window / install surface -->
  <rect x="70" y="66" width="160" height="160" rx="28" fill="#FFFFFF" />

  <!-- Install / download glyph -->
  <g transform="translate(150 146) scale(4.2) translate(-12 -12)"
     fill="none" stroke="#4338CA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
    <polyline points="7 10 12 15 17 10" />
    <line x1="12" y1="15" x2="12" y2="3" />
  </g>

  <!-- Push notification badge -->
  <circle cx="228" cy="72" r="36" fill="#FF6B4A" stroke="#4338CA" stroke-width="4" />
  <g transform="translate(228 72) scale(1.5) translate(-12 -12)"
     fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
    <path d="M13.73 21a2 2 0 0 1-3.46 0" />
  </g>
</svg>
